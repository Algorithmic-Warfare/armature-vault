[package]
name = "armature_vault"
edition = "2024"
version = "0.0.1"

# armature_vault — a DAO/OU-gated vault for warehouse receipts (and, later,
# other shared resources). Players mint multicoin::Balance receipts via the
# warehouse_receipts package and deposit them here; access is gated by a
# dynamic, multi-principal ACL keyed on armature DAO identity rather than a raw
# in-game tribe_id. Standalone, optional package: it lives outside the
# transitional armature_world_bridge because the vault outlives the bridge.
#
# Target environment: testnet_stillness — armature_vault, the framework, world,
# and warehouse-receipts/triexbook all resolve multicoin to the same build
# (c7a97f2), so the `multicoin::Balance` receipt type is identical across the
# deposit boundary, and world to 8e2e97b so StorageUnit/Character match.
#
# BLOCKER (same as armature-trading): armature_framework on `main` declares only
# `testnet_wip` (plus the implicit testnet/mainnet), NOT `testnet_stillness`.
# Move's automated address management requires every transitive dep to declare the
# build env, so `sui move build -e testnet_stillness` fails to resolve `armature`
# until the framework adds a `testnet_stillness` entry to its [environments].
# Until then, build/test against `-e testnet_wip` (a shared env both this package
# and the framework declare).
[dependencies]
armature = { git = "https://github.com/loash-industries/armature.git", subdir = "packages/armature_framework", rev = "4bd6fbaea43fab3967b0c1627b1bea679abc78c3" }
world = { git = "https://github.com/evefrontier/world-contracts.git", subdir = "contracts/world", rev = "8e2e97b50fd6bbf605284bcdaae54a33a5475e89" }
# override = true: armature (framework) transitively pins multicoin at 330d339;
# we intentionally unify on c7a97f2 (same as warehouse-receipts / armature-trading
# / triexbook) so `multicoin::Balance` receipts are the same on-chain type.
multicoin = { git = "https://github.com/Algorithmic-Warfare/multicoin", subdir = "packages/multicoin", rev = "c7a97f2f42ffbddbe2d44686cbc9eebd1810b8d6", override = true }
# F1 (#3): warehouse_receipts hosts `VaultConfig` which custodies the
# Collection<-> StorageUnit binding. We accept `&VaultConfig` at
# initialize_dao_vault so the SSU <-> collection_id binding is verified on-chain
# rather than trusted from a caller-supplied raw ID.
#
# Pinned to 8a2f80e (the most recent rev where the upstream package's sources
# and tests are in sync — HEAD has a source-only `to_ssu_owner: bool` param
# change that wasn't propagated to receipt_tests.move, which breaks
# `sui move test` because Sui compiles transitive dep test code in test mode).
#
# IMPORTANT: warehouse_receipts upstream declares `multicoin = main` (floating)
# and pins world to a different rev than we want. Type-identity with the rest
# of the on-chain build is enforced by our `override = true` on multicoin
# AND our top-level pins on world (the resolution algorithm picks the
# top-level pin when overriding, regardless of what the upstream dep declares).
# If we ever drop the multicoin override or our world pin, we will silently
# pick up whatever upstream resolved — that would break `multicoin::Balance`
# type identity at the deposit boundary. Bump warehouse_receipts here only
# alongside the multicoin/world pins above.
warehouse_receipts = { git = "https://github.com/loash-industries/warehouse-receipts.git", subdir = "packages/contracts", rev = "8a2f80e857d516187c99b28efa935ff7ce42af03" }

[environments]
testnet_wip = "4c78adac"
